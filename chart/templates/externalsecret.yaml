# Syncs this MCP server's UAMI client ID and the shared tenant ID from Key
# Vault into env vars on the pod. The UAMI is defined in ../../infra/; the
# tenant-id secret is published from nelsong6/tank-operator/infra/mcp.tf as
# a cross-MCP convenience.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-azure-personal-config
  namespace: mcp-azure
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: mcp-azure-personal-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: mcp-azure-personal-mi-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: mcp-tenant-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
