# Syncs this MCP server's UAMI client ID and tenant ID from the app-owned
# Key Vault into env vars on the pod. The UAMI and app-vault copies are
# defined in ../../infra/.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-azure-personal-config
  namespace: mcp-azure-personal
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: mcp-azure-personal-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: mcp-azure-personal-mi-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: mcp-tenant-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
