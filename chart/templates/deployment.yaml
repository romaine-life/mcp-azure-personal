apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-azure-personal
  namespace: mcp-azure-personal
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mcp-azure-personal
  template:
    metadata:
      labels:
        app: mcp-azure-personal
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: mcp-azure-personal
      containers:
        - name: mcp-azure-personal
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: upstream
              containerPort: {{ .Values.upstreamPort }}
          envFrom:
            - secretRef:
                name: mcp-azure-personal-config
          env:
            - name: PORT
              value: "{{ .Values.upstreamPort }}"
            - name: AZURE_SUBSCRIPTION_ID
              value: "{{ .Values.subscriptionId }}"
            - name: AZURE_FEDERATED_TOKEN_FILE
              value: /var/run/secrets/azure/tokens/azure-identity-token
            - name: AZURE_AUTHORITY_HOST
              value: https://login.microsoftonline.com/
            - name: AZURE_TOKEN_CREDENTIALS
              value: WorkloadIdentityCredential
            # Azure break-glass enforcement (tank-operator azure break-glass
            # plan, stage 3). When enforce is true the MCP surface requires an
            # active Tank grant for the caller's session; the server mints its
            # own role=service JWT from the projected auth.romaine.life-audience
            # SA token (volume below) to look the grant up.
            - name: AZURE_BREAK_GLASS_ENFORCE
              value: "{{ .Values.breakGlass.enforce }}"
            - name: AZURE_BREAK_GLASS_EXEMPT_SUBJECTS
              value: "{{ .Values.breakGlass.exemptSubjects }}"
            - name: TANK_OPERATOR_INTERNAL_URL
              value: "{{ .Values.breakGlass.tankInternalUrl }}"
            - name: AUTH_ROMAINE_EXCHANGE_URL
              value: "{{ .Values.breakGlass.exchangeUrl }}"
            - name: AUTH_ROMAINE_SA_TOKEN_FILE
              value: /var/run/secrets/auth.romaine.life/token
            # auth.romaine.life service principals allowed to POST
            # /internal/grant-activated (the orchestrator fires it on grant).
            - name: AZURE_GRANT_ACTIVATED_PRINCIPALS
              value: "{{ .Values.breakGlass.grantActivatedPrincipals }}"
          volumeMounts:
            - name: auth-romaine-sa-token
              mountPath: /var/run/secrets/auth.romaine.life
              readOnly: true
          readinessProbe:
            exec:
              command: ["python", "-c", "import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', {{ .Values.upstreamPort }})); s.close()"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        - name: kube-rbac-proxy
          image: "{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          args:
            - --insecure-listen-address=0.0.0.0:{{ .Values.proxy.port }}
            - --upstream=http://127.0.0.1:{{ .Values.upstreamPort }}/
            - --config-file=/etc/kube-rbac-proxy/config.yaml
            # /internal/grant-activated is gated by the auth.romaine.life service
            # JWT in the server (not the SA RBAC), so skip the SA check for it.
            - --ignore-paths=/internal/grant-activated
            - --v=2
          ports:
            - name: proxy
              containerPort: {{ .Values.proxy.port }}
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/kube-rbac-proxy
              readOnly: true
          resources:
            {{- toYaml .Values.proxyResources | nindent 12 }}
      volumes:
        - name: proxy-config
          configMap:
            name: kube-rbac-proxy
        # Projected SA token, audience-pinned to auth.romaine.life. The server
        # exchanges it for a role=service JWT to call tank-operator's internal
        # azure break-glass grant lookup. Distinct audience from the cluster SA
        # token kube-rbac-proxy validates, so a stolen token can't be replayed.
        - name: auth-romaine-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: https://auth.romaine.life
                  expirationSeconds: 3600
                  path: token
