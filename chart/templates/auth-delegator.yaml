# kube-rbac-proxy in the Azure MCP Deployment validates caller SA tokens.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-azure-personal-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: mcp-azure-personal
    namespace: mcp-azure
