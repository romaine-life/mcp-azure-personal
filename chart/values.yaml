# ============================================================================
# mcp-azure values
# ============================================================================
# UAMI client ID and tenant ID are synced from the app-owned Key Vault at
# runtime via the ExternalSecret in templates/externalsecret.yaml. The UAMI
# and app-vault secret copies are defined in ../infra/.

image:
  repository: romainecr.azurecr.io/mcp-azure-personal
  # SHA-pinned. .github/workflows/build.yml rewrites this tag on every push to main
  # via a `[skip ci]` follow-up commit. Quoted so all-digit short-SHAs don't
  # become floats.
  tag: "ae2d172"
  pullPolicy: IfNotPresent

# Loopback-only port the MCP server listens on. Sidecar fronts it.
upstreamPort: 8080

subscriptionId: 606a1ca1-5833-4d21-8937-d0fcd97cd0a0

externalSecret:
  storeName: ng6-mcp-azure-personal
  storeKind: ClusterSecretStore
  vaultUrl: https://ng6-mcp-azure-personal.vault.azure.net/

# kube-rbac-proxy sidecar — terminates client connections, calls the K8s
# API's TokenReview to validate incoming bearer SA tokens, then forwards to
# the MCP server on localhost. Plain HTTP (insecure-listen-address) — in-cluster
# traffic doesn't gain meaningfully from TLS without a service mesh, and
# avoiding cert plumbing keeps v1 simple.
proxy:
  image:
    repository: quay.io/brancz/kube-rbac-proxy
    tag: v0.18.2
    pullPolicy: IfNotPresent
  port: 8443

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi

proxyResources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

# Azure break-glass enforcement (tank-operator azure break-glass plan, stage 3).
# Ships inert: enforce=false keeps the MCP surface open so this PR is safe to
# merge/deploy on its own. The cutover is a deliberate later step — flip
# enforce to true ONLY after:
#   1. auth.romaine.life allowlists this server's SA (namespace/SA
#      mcp-azure-personal/mcp-azure-personal) in K8S_SERVICE_SA_ALLOWLIST so the
#      token exchange below succeeds, and
#   2. exemptSubjects lists Hermes's service identity (sub or actor_email), or
#      Hermes loses its unattended Azure access at cutover.
# exemptSubjects is a comma-separated allowlist of JWT sub/actor_email/email
# values that bypass the grant requirement.
breakGlass:
  enforce: false
  exemptSubjects: ""
  tankInternalUrl: http://tank-operator.tank-operator.svc.cluster.local
  exchangeUrl: https://auth.romaine.life/api/auth/exchange/k8s
